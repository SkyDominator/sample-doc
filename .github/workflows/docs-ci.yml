name: Docs CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./sdk
          pip install pytest pytest-cov ruff mypy griffe requests pyyaml

      - name: Lint and type check
        run: |
          ruff check sdk/
          mypy sdk/

      - name: Run unit tests
        run: pytest sdk/tests/ -v --cov

      - name: Generate API reference
        run: python scripts/generate_api.py

      - name: Generate English docs
        env:
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          GOOGLE_TRANSLATE_PROJECT_ID: ${{ secrets.GOOGLE_TRANSLATE_PROJECT_ID }}
          GOOGLE_TRANSLATE_LOCATION: ${{ vars.GOOGLE_TRANSLATE_LOCATION }}
          TRANSLATE_MOCK_MODE: ${{ vars.TRANSLATE_MOCK_MODE }}
        run: |
          if [ -n "$GOOGLE_TRANSLATE_API_KEY" ] && [ -n "$GOOGLE_TRANSLATE_PROJECT_ID" ]; then
            python scripts/translate_docs.py
          else
            echo "Translation credentials are unavailable. Falling back to TRANSLATE_MOCK_MODE=true."
            TRANSLATE_MOCK_MODE=true python scripts/translate_docs.py
          fi

      - name: Validate snippets against mock SDK
        env:
          MOCK_RNGD_HARDWARE: "true"
        run: python scripts/validate_snippets.py

      - name: Validate playground scenarios against mock SDK
        env:
          MOCK_RNGD_HARDWARE: "true"
        run: python scripts/validate_playgrounds.py

      - name: Bundle SDK sources for the playground
        run: python scripts/bundle_sdk_for_playground.py

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Build docs site
        run: |
          pnpm --prefix docs install --frozen-lockfile
          pnpm --prefix docs build

      - name: Link check
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          fail: true
          args: >-
            --no-progress
            --verbose
            --root-dir ${{ github.workspace }}/docs/.next/server/app
            --remap "file://${{ github.workspace }}/docs/.next/server/app/_next/static file://${{ github.workspace }}/docs/.next/static"
            --fallback-extensions html
            --exclude ^https://fonts\.googleapis\.com/?$
            --exclude ^https://fonts\.gstatic\.com/?$
            docs/.next/**/*.html
