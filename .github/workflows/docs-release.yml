name: Docs Release

on:
  workflow_run:
    workflows: ["Docs CI"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.value }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sdk/pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e './sdk[dev]'
          pip install requests pyyaml

      - name: Generate API reference
        run: python scripts/generate_api.py

      - name: Generate English docs
        env:
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          GOOGLE_TRANSLATE_PROJECT_ID: ${{ secrets.GOOGLE_TRANSLATE_PROJECT_ID }}
          GOOGLE_TRANSLATE_LOCATION: ${{ vars.GOOGLE_TRANSLATE_LOCATION }}
          TRANSLATE_MOCK_MODE: ${{ vars.TRANSLATE_MOCK_MODE }}
        run: |
          if [ -n "$GOOGLE_TRANSLATE_API_KEY" ] && [ -n "$GOOGLE_TRANSLATE_PROJECT_ID" ]; then
            python scripts/translate_docs.py
          else
            echo "Translation credentials are unavailable. Falling back to TRANSLATE_MOCK_MODE=true."
            TRANSLATE_MOCK_MODE=true python scripts/translate_docs.py
          fi

      - name: Validate snippets against mock SDK
        env:
          MOCK_RNGD_HARDWARE: "true"
        run: python scripts/validate_snippets.py

      - name: Validate playground scenarios against mock SDK
        env:
          MOCK_RNGD_HARDWARE: "true"
        run: python scripts/validate_playgrounds.py

      - name: Bundle SDK sources for the playground
        run: python scripts/bundle_sdk_for_playground.py

      - name: Check generated docs artifacts are committed
        run: |
          git diff --exit-code -- docs/content/docs docs/playground/sdk-sources.json || {
            echo "Generated docs artifacts are out of date. Run scripts/generate_api.py, scripts/translate_docs.py, and scripts/bundle_sdk_for_playground.py, then commit the results before releasing.";
            exit 1;
          }

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install docs dependencies
        run: |
          pnpm --prefix docs install --frozen-lockfile

      - name: Build production docs export
        env:
          DOCS_STATIC_EXPORT: "true"
          DOCS_BASE_PATH: ${{ vars.DOCS_BASE_PATH }}
        run: |
          if [[ -z "$DOCS_BASE_PATH" ]]; then
            DOCS_BASE_PATH="/${GITHUB_REPOSITORY#*/}"
          fi
          echo "Using DOCS_BASE_PATH=$DOCS_BASE_PATH"
          export DOCS_BASE_PATH
          pnpm --prefix docs build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/out

  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
